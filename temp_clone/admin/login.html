<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录 - 顺明的作品集</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        
        .logo-icon svg {
            width: 30px;
            height: 30px;
            color: white;
        }
        
        .logo h1 {
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
        }
        
        .logo p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }
        
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            font-size: 1.2rem;
        }
        
        .toggle-password:hover {
            color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
        
        .error-message.show {
            display: block;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: #666;
        }
        
        .remember-me input {
            cursor: pointer;
        }
        
        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: #999;
            margin-top: 1.5rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7v10c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-10-5z"/>
                </svg>
            </div>
            <h1>管理后台</h1>
            <p>顺明的作品集</p>
        </div>
        
        <form id="loginForm">
            <div class="error-message" id="errorMessage"></div>
            
            <div class="form-group">
                <label for="password">管理员密码</label>
                <div class="input-wrapper">
                    <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="输入密码" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                </div>
            </div>
            
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe" style="margin: 0; cursor: pointer;">记住我（30天内自动登录）</label>
            </div>
            
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">进入管理后台</span>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </button>
        </form>
        
        <div class="footer-text">
            💡 提示：密码已加密存储，只有你知道
        </div>
    </div>
    
    <script>
        // 配置密码（你可以修改这个）
        const ADMIN_PASSWORD = 'shunming2026'; // 改成你想要的密码
        const TOKEN_KEY = 'admin_token';
        const REMEMBER_KEY = 'admin_remember';
        
        // 检查是否已登录
        function checkLogin() {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token && verifyToken(token)) {
                redirectToAdmin();
            }
        }
        
        // 生成token
        function generateToken(password) {
            const timestamp = Date.now();
            const hash = btoa(password + timestamp); // 简单加密
            return hash + '_' + timestamp;
        }
        
        // 验证token
        function verifyToken(token) {
            try {
                const [hash, timestamp] = token.split('_');
                const now = Date.now();
                const age = now - parseInt(timestamp);
                
                // 30天有效期
                const thirtyDays = 30 * 24 * 60 * 60 * 1000;
                return age < thirtyDays;
            } catch (e) {
                return false;
            }
        }
        
        // 切换密码显示
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = event.target;
            
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }
        
        // 登录处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorMsg = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loading = document.getElementById('loading');
            
            // 显示加载状态
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            loading.style.display = 'block';
            errorMsg.classList.remove('show');
            
            // 模拟网络延迟
            setTimeout(() => {
                if (password === ADMIN_PASSWORD) {
                    // 密码正确
                    const token = generateToken(password);
                    localStorage.setItem(TOKEN_KEY, token);
                    
                    if (rememberMe) {
                        localStorage.setItem(REMEMBER_KEY, 'true');
                    }
                    
                    // 重定向到管理后台
                    redirectToAdmin();
                } else {
                    // 密码错误
                    errorMsg.textContent = '❌ 密码错误，请重试';
                    errorMsg.classList.add('show');
                    
                    loginBtn.disabled = false;
                    btnText.style.display = 'inline';
                    loading.style.display = 'none';
                    
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 800);
        });
        
        // 重定向到管理后台
        function redirectToAdmin() {
            window.location.href = 'index.html';
        }
        
        // 页面加载时检查登录状态
        window.addEventListener('load', checkLogin);
    </script>
</body>
</html>
